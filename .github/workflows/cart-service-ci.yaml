name: cart-service-ci

on:
  push:
    branches:
      - main
    paths:
      - 'src/cart-service/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/cart-service/**'

env:
  APP_NAME: cart-service
  DOCKERHUB_ID: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.run_id }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─── JOB 1: BUILD & TEST ───────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd src/cart-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Unit tests
        run: |
          cd src/cart-service
          pip install pytest
          if [ ! -d "tests" ]; then
            echo "⚠️ No tests/ directory found — skipping. Add tests to src/cart-service/tests/"
            exit 0
          fi
          pytest tests/ || exit_code=$?
          if [ "${exit_code:-0}" -eq 5 ]; then
            echo "⚠️ No tests collected — skipping."
            exit 0
          fi
          exit ${exit_code:-0}

  # ─── JOB 2: CODE QUALITY ───────────────────────────────────────────────────
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ruff
        run: pipx install ruff

      - name: Lint code with Ruff
        run: |
          cd src/cart-service
          ruff check --output-format=github --target-version=py39

      - name: Check code formatting with Ruff
        run: |
          cd src/cart-service
          ruff format --diff --target-version=py39
        continue-on-error: true

  # ─── JOB 3: BUILD & PUSH DOCKER IMAGE ─────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [build, code-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v7
        with:
          context: src/cart-service/
          file: src/cart-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cart-service:${{ github.run_id }}
            ${{ secrets.DOCKER_USERNAME }}/cart-service:latest

  # ─── JOB 4: UPDATE KUBERNETES MANIFEST ────────────────────────────────────
  update-k8s:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: Edwin-Oghenetejiri1/retrogame-k8s-manifests
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Update tag in Kubernetes deployment manifest
        run: |
          sed -i "s|image: .*cart-service.*|image: ${{ env.DOCKERHUB_ID }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}|" cart-service/deploy.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          branch: release/${{ env.APP_NAME }}-update-${{ env.IMAGE_TAG }}
          commit-message: "Update ${{ env.APP_NAME }} image to ${{ env.DOCKERHUB_ID }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
          title: "Update ${{ env.APP_NAME }} image to ${{ env.DOCKERHUB_ID }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
          body: |
            This pull request updates the ${{ env.APP_NAME }} image tag.
          base: main
          delete-branch: true
          labels: |
            automated