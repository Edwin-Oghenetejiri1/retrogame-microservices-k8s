# CI for Product service
name: product-service-ci

on:
  push:
    branches:
      - main
    paths:
      - 'src/product-service/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/product-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Setup Go 1.22
      uses: actions/setup-go@v2
      with:
        go-version: 1.22

    - name: Build
      run: |
        cd src/product-service
        go mod download
        go build -o product-service main.go

    - name: unit tests with coverage
      run: |
        cd src/product-service
        go test ./... -coverprofile=coverage.out

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: src/product-service/coverage.out

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Setup Go 1.22
      uses: actions/setup-go@v2
      with:
        go-version: 1.22

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.55.2
        run: golangci-lint run
        working-directory: src/product-service

  sonarcloud:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for SonarCloud blame info

    - name: Download coverage report
      uses: actions/download-artifact@v4
      with:
        name: coverage-report
        path: src/product-service

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      with:
        projectBaseDir: src/product-service
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: [build, code-quality, sonarcloud]
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Install Docker
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Docker Push
      uses: docker/build-push-action@v6
      with:
        context: src/product-service
        file: src/product-service/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.run_id }}

  updatek8s:
    runs-on: ubuntu-latest
    needs: docker
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: main

    - name: Update tag in kubernetes deployment manifest
      run: |
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.run_id }}|" kubernetes/product-service/deploy.yaml

    - name: Commit and push changes
      run: |
        git config --global user.email "darealthej@gmail.com"
        git config --global user.name "Edwin-Oghenetejiri1"
        git add kubernetes/product-service/deploy.yaml
        git commit -m "[CI]: Update product-service image tag"
        git push origin main