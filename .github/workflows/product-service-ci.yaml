name: product-service-ci

on:
  push:
    branches:
      - main
    paths:
      - 'src/product-service/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/product-service/**'

env:
  APP_NAME: product-service
  DOCKERHUB_ID: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.run_id }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Build
        run: |
          cd src/product-service
          go mod download
          go build -o product-service main.go

      - name: Unit tests
        run: |
          cd src/product-service
          go test ./...

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.55.2
          args: --timeout=3m
          working-directory: src/product-service

  docker:
    runs-on: ubuntu-latest
    needs: [build, code-quality] # Removed sonarcloud dependency
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: src/product-service
          file: src/product-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.run_id }}
            ${{ secrets.DOCKER_USERNAME }}/product-service:latest

  update-k8s:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: Edwin-Oghenetejiri1/retrogame-k8s-manifests
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Update tag in Kubernetes deployment manifest
        run: |
          sed -i "s|image: .*product-service.*|image: ${{ env.DOCKERHUB_ID }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}|" product-service/deploy.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          branch: release/${{ env.APP_NAME }}-update-${{ env.IMAGE_TAG }}
          commit-message: "Update ${{ env.APP_NAME }} image to ${{ env.DOCKERHUB_ID }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
          title: "Update ${{ env.APP_NAME }} image to ${{ env.DOCKERHUB_ID }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
          body: |
            This pull request updates the ${{ env.APP_NAME }} image tag.
          base: main
          delete-branch: true
          labels: |
            automated