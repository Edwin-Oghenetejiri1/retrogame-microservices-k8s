name: payment-service-ci

on:
  push:
    branches:
      - main
    paths:
      - 'src/payment-service/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/payment-service/**'

env:
  APP_NAME: payment-service
  DOCKERHUB_ID: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.run_id }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─── JOB 1: BUILD & TEST ───────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Install dependencies
        run: |
          cd src/payment-service
          dotnet restore

      - name: Build
        run: |
          cd src/payment-service
          dotnet build --no-restore

      - name: Unit tests
        run: |
          cd src/payment-service
          dotnet test --no-build

  # ─── JOB 2: CODE QUALITY ───────────────────────────────────────────────────
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Install dotnet format
        run: dotnet tool install -g dotnet-format

      - name: Run dotnet format (lint check)
        run: |
          cd src/payment-service
          dotnet format --verify-no-changes --no-restore
        continue-on-error: true

  # ─── JOB 3: BUILD & PUSH DOCKER IMAGE ─────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [build, code-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: src/payment-service
          file: src/payment-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/payment-service:${{ github.run_id }}
            ${{ secrets.DOCKER_USERNAME }}/payment-service:latest

  # ─── JOB 4: UPDATE KUBERNETES MANIFEST ────────────────────────────────────
  update-k8s:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: Edwin-Oghenetejiri1/retrogame-k8s-manifests
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Update tag in Kubernetes deployment manifest
        run: |
          sed -i "s|image: .*payment-service.*|image: ${{ env.DOCKERHUB_ID }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}|" payment-service/deploy.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          branch: release/${{ env.APP_NAME }}-update-${{ env.IMAGE_TAG }}
          commit-message: "Update ${{ env.APP_NAME }} image to ${{ env.DOCKERHUB_ID }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
          title: "Update ${{ env.APP_NAME }} image to ${{ env.DOCKERHUB_ID }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
          body: |
            This pull request updates the ${{ env.APP_NAME }} image tag.
          base: main
          delete-branch: true
          labels: |
            automated